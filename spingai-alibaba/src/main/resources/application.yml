spring:
  application:
    name: spingai-alibaba
  data:
    redis:
      host: 192.168.193.213
      port: 6379
      # password: your_password   # 如果 Redis 设了密码就打开这行
      database: 0
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-max
          temperature: 0.7
          max-tokens: 2048
  datasource:
    url: jdbc:mysql://192.168.193.213:3306/xiaoxinai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: Aa123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
      hibernate:
        ddl-auto: none        # 生产用 none，表结构手动建
        show-sql: true
        open-in-view: false
        database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 8081
logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
    com.xiaoxin.spingaialibaba: INFO