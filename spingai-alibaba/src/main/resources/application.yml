spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
  application:
    name: spingai-alibaba
  data:
    redis:
      host: ${REDIS_HOST:192.168.193.213}
      port: ${REDIS_PORT:6379}
      # password: your_password   # 如果 Redis 设了密码就打开这行
      database: 0
  ai:
    # 全局默认用哪个厂商，可选值：deepseek / qwen
    # ModelRouterService 里没有明确指定时，fallback 到这里
    default-provider: deepseek
    providers:
      deepseek:
        # 调用时动态传给 ChatOptions.model()，想换推理模型只改这里
        # 例如：deepseek-chat → deepseek-reasoner（深度思考模式）
        model: deepseek-chat
      qwen:
        # 例如：qwen-plus → qwen-max（更强但更贵）
        model: qwen-plus
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-max
          temperature: 0.7
          max-tokens: 2048
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
    vectorstore:
      pgvector:
        initialize-schema: true          # 自动建向量表，第一次启动后可关掉
        index-type: HNSW                 # HNSW 索引，查询速度快
        distance-type: COSINE_DISTANCE   # 余弦相似度
        dimensions: 1024                 # text-embedding-v3 的向量维度是 1024，别填错，填错了报错很难排查
  datasource:
    url: jdbc:postgresql://${DB_HOST:192.168.193.213}:5432/vectordb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    jpa:
      hibernate:
        ddl-auto: none        # 生产用 none，表结构手动建
        show-sql: true
        open-in-view: false
        database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 8081
logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
    com.xiaoxin.spingaialibaba: INFO